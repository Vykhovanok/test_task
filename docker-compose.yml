services:
  postgres:
    image: postgres:18
    container_name: fss-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: file_storage_service
    ports:
      - "5433:5432"
    volumes:
      - fss_pg_data:/var/lib/postgresql

  redis:
    image: redis:7
    container_name: fss-redis
    ports:
      - "6379:6379"

volumes:
  fss_pg_data:
